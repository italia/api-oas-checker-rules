rules:
  missing-retry-after:
    description: |-
      When a client is warned about a temporary server issue with a 503 status code,
      the server should explicitly communicate how long to wait
      before issuing further requests using the Retry-After header.

      Retry-After is defined in RFC7231.
    message: "[RFC7231] A 503 response must include the `Retry-After` header."
    formats:
      - oas3
    severity: warn
    recommended: true
    given: >-
      $..[responses][?(@property == "503" )][headers]
    then:
      field: Retry-After
      function: truthy
  missing-ratelimit:
    description: |-
      Ratelimiting an API preserves a service and limits attack scenario
      [see API4:2019 Lack of Resources & Rate Limiting](https://owasp.org/www-project-api-security).

      APIs should use the following headers on successful and client error responses:
      - `X-RateLimit-Limit`: number of total requests in a give time window
      - `X-RateLimit-Remaining`: remaining requests in the current window
      - `X-RateLimit-Reset`: number of seconds before the window resets

      An example set of headers is the following

      ```
      X-Ratelimit-Limit: 100
      X-Ratelimit-Remaining: 40
      X-Ratelimit-Reset: 12
      ```

      A standardization proposal for ratelimit headers is ongoing
      inside the IETF HTTPAPI Workgroup.
      See [the draft](https://datatracker.ietf.org/doc/draft-ietf-httpapi-ratelimit-headers/)
    message: "[RFC7231] 2xx/4xx responses must include all three rate-limit headers (Limit, Remaining, Reset) using one consistent prefix: either 'X-RateLimit-' or 'RateLimit-'."
    formats:
      - oas3
    severity: warn
    recommended: true
    given: >-
      $..[responses][?(@property[0] == "2" || (@property[0] == "4" && @property != "429"))][headers]
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          allOf:
            - oneOf:
                - required: [X-RateLimit-Limit]
                  not:
                    required: [RateLimit-Limit]
                - required: [RateLimit-Limit]
                  not:
                    required: [X-RateLimit-Limit]
            - oneOf:
                - required: [X-RateLimit-Remaining]
                  not:
                    required: [RateLimit-Remaining]
                - required: [RateLimit-Remaining]
                  not:
                    required: [X-RateLimit-Remaining]
            - oneOf:
                - required: [X-RateLimit-Reset]
                  not:
                    required: [RateLimit-Reset]
                - required: [RateLimit-Reset]
                  not:
                    required: [X-RateLimit-Reset]

  ratelimit-429-presence:
    description: |-
      429 (Too Many Requests) responses must include either the `Retry-After` header 
      or a complete set of RateLimit headers (`Limit`, `Remaining`, `Reset`).
    message: "[RFC6585] A 429 response must include 'Retry-After' or a full set of rate-limit headers: X-RateLimit-{Limit,Remaining,Reset} or RateLimit-{Limit,Remaining,Reset}."
    severity: warn
    formats: [oas3]
    given: $..[responses][?(@property == "429")][headers]
    then:
      function: schema
      functionOptions:
        schema:
          anyOf:
            - required: [Retry-After]
            - required: [RateLimit-Limit, RateLimit-Remaining, RateLimit-Reset]
            - required: [X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset]

  ratelimit-429-completeness:
    description: |-
      If RateLimit headers are provided for a 429 response, all three headers 
      (Limit, Remaining, Reset) must be present and follow the same naming convention 
      (standard or X- prefix). 
      If both Retry-After and Reset are present, they should ideally represent 
      the same time interval.
    message: "[RFC6585] A 429 response must include all three rate-limit headers (Limit, Remaining, Reset) using one consistent prefix: either 'X-RateLimit-' or 'RateLimit-', never mixed."
    severity: error
    formats: [oas3]
    given: >-
      $..[responses][?(@property == "429")][headers][?(@ && (@["X-RateLimit-Limit"] || @["X-RateLimit-Remaining"] || @["X-RateLimit-Reset"] || @["RateLimit-Limit"] || @["RateLimit-Remaining"] || @["RateLimit-Reset"]))]
    then:
      function: schema
      functionOptions:
        schema:
          oneOf:
            - allOf:
                - required: [RateLimit-Limit, RateLimit-Remaining, RateLimit-Reset]
                - not:
                    anyOf:
                      - required: [X-RateLimit-Limit]
                      - required: [X-RateLimit-Remaining]
                      - required: [X-RateLimit-Reset]
            - allOf:
                - required: [X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset]
                - not:
                    anyOf:
                      - required: [RateLimit-Limit]
                      - required: [RateLimit-Remaining]
                      - required: [RateLimit-Reset]

