rules:
  paths-status:
    description: |-
      You must define a `/status` path that can be used to health-check the API.
      Using this path avoids the arbitrary usage of a server URL for health-check
      scope.

      The `/status` endpoint should return:
      - a `application/json` or `application/problem+json` response with 200 OK when the service is up.
      - a `application/problem+json` response with 503 Service Unavailable when the service is down.

      The service provider is free to define the implementation logic for this path.
    message: 'The "/status" path must be defined for API health-checks.'
    severity: error
    recommended: true
    given: $.paths
    then:
      function: schema
      functionOptions:
        schema:
          oneOf:
          - type: object
            required:
            - "/status"
            properties:
              "/status":
                type: object
          - type: object
            additionalProperties: false

  paths-status-return-json:
    description: |-
      The "/status" endpoint must return "application/json" or "application/problem+json" when the service is Up.
    message: 'The "/status" (Up) response must be "application/json" or "application/problem+json".'
    severity: error
    recommended: true
    given: >-
      $.paths.'/status'.get.responses.200.content.*~
    then:
      function: enumeration
      functionOptions:
        values:
        - application/json
        - application/problem+json
  paths-status-return-problem:
    description: |-
      The "/status" endpoint must return "application/problem+json" for all 4xx and 5xx error responses (Down state).
    message: 'The "/status" (Down) response ({{property}}) must be "application/problem+json".'
    severity: error
    recommended: true
    given: >-
      $.paths.'/status'.get.responses[?(@property.match(/^(4|5)/))].content.*~
    then:
      function: enumeration
      functionOptions:
        values:
        - application/problem+json
  paths-status-problem-schema:
    description: |-
      The "/status" error response (4xx/5xx) must be a Problem object (RFC7807).
    message: 'The "/status" (Down) response schema ({{property}}) must include standard Problem fields (status, title, detail).'
    severity: warn
    recommended: true
    given: >-
      $.paths.'/status'.get.responses[?(@property.match(/^(4|5)/))].content.[schema]
    then:
    - function: truthy
      field: 'properties.status'
      message: 'The "/status" (Down) response schema must include the standard Problem field "status".'
    - function: truthy
      field: 'properties.title'
      message: 'The "/status" (Down) response schema must include the standard Problem field "title".'
    - function: truthy
      field: 'properties.detail'
      message: 'The "/status" (Down) response schema must include the standard Problem field "detail".'
  paths-http-method:
    description: |-
      When you design a REST API, you don't usually need to mention terms like
      `get`, `delete` and so on in your `paths`, because this information is
      conveyed by the HTTP method.

      Instead of using

      ```
      POST /books/1234/delete HTTP/1.1
      Host: api.example
      ```

      You can simply call

      ```
      DELETE /books/1234 HTTP/1.1
      Host: api.example
      ```

      Similarly you don't need verbs like `list` or `create` because
      the HTTP Semantics RFC7231 supports this kind of actions natively
      with proper methods and status code.

      Instead of

      ```
      POST /create/user HTTP/1.1
      Host: api.example
      Content-Type: application/json

      {"given_name": "Mario"}
      ```

      You can use
      ```
      POST /create/user HTTP/1.1
      Host: api.example
      Content-Type: application/json

      {"given_name": "Mario"}
      ```

      returning a proper response

      ```
      HTTP/1.1 201 Created
      Location: /users/1234

      ```

      This simplifies securing your API as you know beforehand the kind of action
      which is going to be performed.
    message: '[RFC7231] Path "{{property}}" contains an HTTP method or action verb (e.g., get, list, create); use proper HTTP methods instead.'
    severity: hint
    recommended: true
    given:
      - >-
        $.paths[?(@property && @property.match(
        "/(get|post|put|delete|patch)[\/A-Z_\-]?"
        ))]
      - >-
        $.paths[?(@property && @property.match(
        "/(create|remove|list)[\/A-Z_\-]?"
        ))]

    then:
      field: "@property"
      function: undefined

